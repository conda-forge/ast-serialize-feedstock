# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "0.4.0"
  python_check_max: "3.14"
  # rattler-build doesn't define SP_DIR during test, and chokes on strings starting with %
  unix_sp_dir: $(python -c "print(__import__('site').getsitepackages()[-1])")
  win_sp_dir: Lib\site-packages
  sp_dir: ${{ unix_sp_dir if unix else "%PREFIX%\\" ~ win_sp_dir }}
  abi3_bin: ast_serialize.${{ "abi3.so" if unix else "pyd" }}

package:
  name: ast-serialize
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/a/ast-serialize/ast_serialize-${{ version }}.tar.gz
  sha256: 74e4e634ab82d1466acf0be27043178570b98ebeaa3165f9240a6fad4c286471

build:
  number: 0
  skip: is_abi3 and not is_python_min
  script:
    env:
      CARGO_PROFILE_RELEASE_LTO: fat
      CARGO_PROFILE_RELEASE_STRIP: symbols
      CARGO: cargo-auditable-wrapper${{ ".bat" if win }}
      PYTHONIOENCODING: utf-8
      PYTHONLEGACYTEXTENCODING: utf-8
    content:
      - if: win
        then:
          # otherwise fails with:
          #  path too long:
          #    '%BUILD_PREFIX%/.cargo/git/checkouts/(~180 characters).snap'; class=Filesystem (30)
          - set CARGO_HOME=c:\.cg
          - copy "%RECIPE_DIR%\cargo-auditable-wrapper.bat" "%BUILD_PREFIX%\Library\bin\cargo-auditable-wrapper.bat"
        else:
          - cp "${RECIPE_DIR}/cargo-auditable-wrapper.sh" "${BUILD_PREFIX}/bin/cargo-auditable-wrapper"
          - chmod 755 "${BUILD_PREFIX}/bin/cargo-auditable-wrapper"
      - ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation --disable-pip-version-check
      - cargo-bundle-licenses --format yaml --output THIRDPARTY.yml
  python:
    version_independent: ${{ is_abi3 }}

requirements:
  build:
    - ${{ compiler("rust") }}
    - ${{ compiler("c") }}
    - ${{ stdlib("c") }}
    - cargo-auditable
    - cargo-bundle-licenses
  host:
    - maturin >=1.9,<2.0
    - pip
    - python
    - if: is_abi3
      then:
        - python-abi3
        - python ${{ python_min }}.*
  run:
    - if: is_abi3
      then:
        - python >=${{ python_min }}
      else:
        - python
  ignore_run_exports:
    by_name:
      - if: is_abi3
        then:
          - python_abi

tests:
  - if: is_abi3
    then:
      - python:
          imports: ast_serialize
          pip_check: true
          python_version:
            - ${{ python_min }}.*
            - ${{ python_check_max }}.*
    else:
      - python:
          imports: ast_serialize
          pip_check: true
  - files:
      source:
        - test_ast_serialize.py
    requirements:
      run:
        - pytest
        - if: is_abi3
          then:
            - abi3audit
    script:
      - python test_ast_serialize.py
      - if: is_abi3
        then:
          - cd "${{ sp_dir }}" && cd ast_serialize
          - abi3audit -s -v --assume-minimum-abi3 ${{ python_min }} ${{ abi3_bin }}

about:
  summary: Python bindings for mypy AST serialization
  license: MIT
  license_file:
    - LICENSE
    - THIRDPARTY.yml
  homepage: https://pypi.org/project/ast-serialize
  repository: https://github.com/mypyc/ast_serialize

extra:
  recipe-maintainers:
    - conda-forge/mypy
    - bollwyvl
